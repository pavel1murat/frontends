//-----------------------------------------------------------------------------
//  define active ROC tab

// main function: createTable
// an element ID should be unique within the page
//-----------------------------------------------------------------------------

     function loadPage() {
       const urlParams = new URLSearchParams(window.location.search);
       g_hostname      = urlParams.get('hostname') || 'none';  // 
       if (g_pcie == -1) { g_pcie = parseInt(urlParams.get('pcie')) || 0; } ;
       
       document.title = 'DTC@'+g_hostname;
       let title       = document.getElementById('table-title');
       title.innerHTML = ''; //&nbsp;&nbsp;&nbsp;'+g_hostname+' DTC status page';
       //-----------------------------------------------------------------------------
       //  create DTC commands table
       // 'dtctabs' is just a class for selecting tabs, no special properties
       //-----------------------------------------------------------------------------
       const dtc_cmd_table = document.getElementById('dtc_cmd_table');
       dtc_cmd_table.innerHTML = '';
       
       let thead = document.createElement('thead');
       
       // ------------------------------------------------------ first row
       let tr = document.createElement('tr');
       let td = document.createElement('td');
       td.colSpan = 2;
       td.innerHTML = `<div class="mtableheader">${g_hostname} DTC Commands</div>`;
       tr.appendChild(td);

       td = document.createElement('td');
       tr.appendChild(td);

       td = document.createElement('td');
       td.colSpan=2;
       td.innerHTML =`
         <div class="tab">
           <button class='dtctabs' id='dtc0' onclick="update_dtc_id(event,'dtc0')">PCIE:0</button>
           <button class='dtctabs' id='dtc1' onclick="update_dtc_id(event,'dtc1')">PCIE:1</button>
         </div>`;
       tr.appendChild(td);

       td = document.createElement('td');
       td.colSpan = 5;
       td.innerHTML = `
         <div class="tab">
           <button class="roctabs" id='roc0' onclick="choose_roc_id(event,'roc0')">ROC0</button>
           <button class="roctabs" id='roc1' onclick="choose_roc_id(event,'roc1')">ROC1</button>
           <button class="roctabs" id='roc2' onclick="choose_roc_id(event,'roc2')">ROC2</button>
           <button class="roctabs" id='roc3' onclick="choose_roc_id(event,'roc3')">ROC3</button>
           <button class="roctabs" id='roc4' onclick="choose_roc_id(event,'roc4')">ROC4</button>
           <button class="roctabs" id='roc5' onclick="choose_roc_id(event,'roc5')">ROC5</button>
           <button class="roctabs" id='roc6' onclick="choose_roc_id(event,'roc6')">ALL </button>
         </div>`;
       
       tr.appendChild(td);

       td = document.createElement('td');
       td.innerHTML = `
         <div class="mtableheader">
           <a href="https://mu2einternalwiki.fnal.gov/wiki/DTC_control_page#DTC_control_commands" target="_blank">help</a>
         </div>`
       tr.appendChild(td);

       thead.appendChild(tr);

       let tbody = document.createElement('tbody');
       // ------------------------------------------------------------- second row
       tr = document.createElement('tr');

       td = document.createElement('td');
       td.colSpan = 9;

       let cmd, btn;
       
       cmd = new Command_B('load_parameters'    ,'load_parameters'    , mu2e_load_conf_table ,'cmd_params', dtc_config_path       ,'trkdtc.log');
       btn = mu2e_make_exec_button_B(cmd);
       td.appendChild(btn);

       cmd = new Command_B('init_readout'       ,'init_readout'       , dtc_command_set_odb_C,'cmd_params', dtc_cmd_parameter_path,'trkdtc.log');
       btn = mu2e_make_dropup_button_B(cmd);
       // btn = mu2e_make_custom_dropup_button(cmd);
       td.appendChild(btn);

       cmd = new Command_B('configure_ja'       ,'configure_ja'       , dtc_command_set_odb_C,'cmd_params', dtc_cmd_parameter_path,'trkdtc.log');
       btn = mu2e_make_dropup_button_B(cmd);
       td.appendChild(btn);
       
       cmd = new Command_B('cfo_launch_run_plan','cfo_launch_run_plan', dtc_command_set_odb_C,'cmd_params', dtc_cmd_parameter_path,'trkdtc.log');
       btn = mu2e_make_dropup_button_B(cmd);
       td.appendChild(btn);

       cmd = new Command_B('read_subevents'     ,'read_subevents'     , dtc_command_set_odb_C,'cmd_params', dtc_cmd_parameter_path,'trkdtc.log');
       btn  = mu2e_make_dropup_button_B(cmd);
       td.appendChild(btn);

       tr.appendChild(td);

       td = document.createElement('td');
       td.innerHTML = 'Register';
       tr.appendChild(td);

       td = document.createElement('td');
       td.innerHTML = 'Value';
       tr.appendChild(td);
       
       tbody.appendChild(tr);

       <!----------------- DTC print status, print ROC status , write reg   -->

       tr = document.createElement('tr');

       td = document.createElement('td');
       td.colSpan = 7;

       cmd = new Command_B('reset output','reset_output',dtc_command_set_odb_C,'cmd_params', dtc_cmd_parameter_path,'trkdtc.log');
       btn = mu2e_make_exec_button_B(cmd);
       td.appendChild(btn);

       cmd = new Command_B('soft_reset'         ,'soft_reset'         ,dtc_command_set_odb_C,'cmd_params', dtc_cmd_parameter_path,'trkdtc.log');
       btn  = mu2e_make_exec_button_B(cmd);
       td.appendChild(btn);

       cmd = new Command_B('hard_reset'         ,'hard_reset'         ,dtc_command_set_odb_C,'cmd_params', dtc_cmd_parameter_path,'trkdtc.log');
       btn  = mu2e_make_exec_button_B(cmd);
       td.appendChild(btn);
       tr.appendChild(td);

       cmd = new Command_B('print_status','print_status',dtc_command_set_odb_C,'cmd_params', dtc_cmd_parameter_path,'trkdtc.log');
       btn = mu2e_make_exec_button_B(cmd);
       td.appendChild(btn);
       
       // order: title, name, ...
       cmd = new Command_B('print ROC status','print_roc_status',dtc_command_set_odb_C,'cmd_params', dtc_cmd_parameter_path,'trkdtc.log');
       btn = mu2e_make_exec_button_B(cmd);
       td.appendChild(btn);

       tr.appendChild(td);

       // PARAMETERS: title,name,cmd,table_name,path_func,log: output of everything trace-related goes to trace.log
       td = document.createElement('td');
       // td.colSpan = 1;
       tr.appendChild(td);
       
       td = document.createElement('td');
       cmdb = new Command_B('write DTC register','write_register',dtc_command_set_odb_C,'cmd_params', dtc_cmd_parameter_path,'trkdtc.log');
       btn  = mu2e_make_exec_button_B(cmdb);
       td.appendChild(btn);
       tr.appendChild(td);

       // read and write need to know a) PCIE b) link in question
       
       td = document.createElement('td');
       td.innerHTML = `<div class="modbvalue" data-odb-path="/Mu2e/Commands/DAQ/Nodes/${g_hostname}/DTC${g_pcie}/write_register/register" data-odb-editable="1" data-format="%x"></div>`;
       tr.appendChild(td);
       
       td = document.createElement('td');
       td.innerHTML = `<div class="modbvalue" data-odb-path="/Mu2e/Commands/DAQ/Nodes/${g_hostname}/DTC${g_pcie}/write_register/value"    data-odb-editable="1" data-format="%x"></div>`;
       tr.appendChild(td);

       tbody.appendChild(tr);

       // -------------------------------------- read register row
       tr = document.createElement('tr');

       td = document.createElement('td');
       td.colSpan = 6;
       tr.appendChild(td);
       
       td = document.createElement('td');
       td.colSpan = 2;
       tr.appendChild(td);

       td = document.createElement('td');
       cmdb = new Command_B('read_DTC_register','read_register',dtc_command_set_odb_C,'cmd_params', dtc_cmd_parameter_path,'trkdtc.log');
       btn  = mu2e_make_exec_button_B(cmdb);
       td.appendChild(btn);
       tr.appendChild(td);

       td  = document.createElement('td');
       td.innerHTML = `<div class="modbvalue" data-odb-path="/Mu2e/Commands/DAQ/Nodes/${g_hostname}/DTC${g_pcie}/read_register/register" data-odb-editable="1" data-format="%x"></div>`;
       tr.appendChild(td);

       td = document.createElement('td');
       td.innerHTML = `<div class="modbvalue" data-odb-path="/Mu2e/Commands/DAQ/Nodes/${g_hostname}/DTC${g_pcie}/read_register/value"    data-odb-editable="1" data-format="%x"></div>`;
       tr.appendChild(td);

       tbody.appendChild(tr);
       
       dtc_cmd_table.appendChild(thead);
       dtc_cmd_table.appendChild(tbody);

       //-----------------------------------------------------------------------------
       //  end, define active DTC tab
       //----------------------------------------------------------------------------

       const el = document.getElementById('dtc'+g_pcie.toString());
       if (el) {
         el.focus();
         el.className += " active";
         console.log('g_pcie=',g_pcie);
       }

       //-----------------------------------------------------------------------------
       //  create ROC commands table
       //-----------------------------------------------------------------------------

       createRocCommandsTable();

       dtc_load_parameters();
     }
         
         
     document.addEventListener("DOMContentLoaded", loadPage);

    
    </script>

  <!--
       it seems to be convenient to have the high-level topology defined in HTML
       and use javascript to fill internal details

  <body class="mcss" onload="mhttpd_init('dtc_control'); show_facilities(); msg_load();">
    <div id="mheader"></div>
    <div id="msidenav"></div>
    <div id="mmain">
      
<!-- ---------------- row 1: DTC registers - are they needed?  and the output field ----------------  -->
      
      <div class="row">
        <h2 id="table-title">DTC </h2>
        
        <div class="column" style="width:41%"> <!-- gets pushed to the left -->
          
          <table class="mtable" id="dtc_cmd_table">  <!-- Table content is generated dynamically -->
          </table>
          
          <table class="mtable" id="roc_commands">  <!-- Table content is generated dynamically -->
          </table>
          
          <table class="mtable" id="cmd_params">    <!-- Table content is generated dynamically -->
          </table>
          
        </div>
        
        <div class="column"; style="width:59%"> <!-- gets pushed to the left -->
          <!--    ------------------------- this is the output window  -->
          <table >
            <tr>
              <td id="navigationFacilitiesButtons"></td>
            </tr>
          </table>
          
          <table class="mtable" id="messageTable" ">
            <tr>
              <td class="select">
                <label for="nameFilter">Filter: </label>
                
                <input type="text" id="nameFilter" placeholder="Program Name" title="Please enter a program name">
                
                <select id="typeFilter" title="Please select a message type">
                  <option value="">- all -</option>
                  <option>INFO</option>
                  <option>ERROR</option>
                  <option>USER</option>
                  <option>LOG</option>
                  <option>TALK</option>
                </select>
                
                <input type="text" id="timeFilter" placeholder="Time (hh:mm:ss)" title="Please select a time to search">
                <input type="text" id="textFilter" placeholder="Search Text" title="Please enter some search text">
                
                <select id="timeRangeFilter" title="We will search the file from the current time into the past">
                  <option>24 h</option>
                  <option>48 h</option>
                  <option>72 h</option>
                  <option>7 d</option>
                  <option>30 d</option>
                </select>
                <button class="mbutton" id="filterBtn">Filter</button>
                
                <select id="recentsDropdown">
                  <option value="">Select a recent filter</option>
                </select>
                
              </td>
            </tr>
            
            <tr>
              <td class="select">
                <div class="mmessagebox mfont" id="messageFrame"><h1 class="mtableheader"> Messages</h1></div>
              </td>
            </tr>
          </table>
          
          <div id="loadingOverlay"
               style="  display: none;
                   position: fixed;
                   top: 0;
                   left: 0;
                   width: 100%;
                   <!--
                   height: 100%;
                   -->
                   height: 600px;
                   background-color: rgba(128, 128, 128, 0.8);
                   color: white;
                   font-size: 24px;
                   align-items: center;
                   justify-content: center;
                   z-index: 1000;">
            Searching messages... Mouse Click to stop.
          </div>
          
        </div>
        
        <div id="dlgError" class="dlgFrame">
          <div class="dlgTitlebar">Error message</div>
          <div class="dlgPanel">
            <div id="dlgErrorText">Dialog Contents</div>
            <br />
            <button class="dlgButton" onClick="dlgHide('dlgError')">Close</button>
          </div>
        </div>
        <script src="mu2e_messages.js"></script>
      </div>
    </div>
  </body>
</html>
