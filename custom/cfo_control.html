<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <link   rel="stylesheet" href="midas.css">
        <script src="controls.js"></script>
        <script src="midas.js"></script>
        <script src="mhttpd.js"></script>
        <script src="filesrw.js"></script>
        <script src="odbbrowser.js"></script>
        
        <link   rel="stylesheet" href="mu2edaq.css">
        
        <script src="global_variables.js"></script>
        <script src="mu2edaq.js">         </script>
        <script src="mu2e_mess_001.js">   </script>
        <script src="dtc_commands.js">    </script>
        
        <title>CFO</title>
        
        <script>

//-----------------------------------------------------------------------------
// main function: createTable
// an element ID should be unique within the page
//-----------------------------------------------------------------------------

         function loadPage() {
             const urlParams = new URLSearchParams(window.location.search);
             g_hostname      = urlParams.get('hostname') || 'none';  // 
             if (g_pcie == -1) { g_pcie = parseInt(urlParams.get('pcie')) || 0; } ;
             
             document.title = 'CFO@'+g_hostname;
             let title       = document.getElementById('table-title');
             title.innerHTML = ''; //&nbsp;&nbsp;&nbsp;'+g_hostname+' DTC status page';
//-----------------------------------------------------------------------------
//  create DTC commands table
// 'dtctabs' is just a class for selecting tabs, no special properties
//-----------------------------------------------------------------------------
             const cmd_table = document.getElementById('cfo_cmd_table');
             cmd_table.innerHTML = '';
             
             let thead = document.createElement('thead');
             /*  first row */
             let tr = document.createElement('tr');
             let td = document.createElement('td');
             td.colSpan = 9;
             td.innerHTML = `<div class="mtableheader">CFO Commands</div>`;
             tr.appendChild(td);
             
             td = document.createElement('td');
             tr.appendChild(td);
             
             td = document.createElement('td');
             td.innerHTML = `
                 <div class="mtableheader">
                     <a href="https://mu2einternalwiki.fnal.gov/wiki/DTC_control_page#DTC_control_commands" target="_blank">help</a>
                 </div>`
             tr.appendChild(td);
             
             thead.appendChild(tr);
             
             let tbody = document.createElement('tbody');
             /*  second row - 9 cells*/
             tr = document.createElement('tr');
             tr.innerHTML = `
                 <td colspan=9>
                     <input type=button value='load parameters'  onClick='cfo_load_parameters()'>
                     <div class="dropup">
                         <input type=button class="dropbtn" value='init readout'>
                         <div class="dropup-content">
                             <div onClick='dtc_load_cmd_parameters("init_readout")'> Load Parameters </div>
                             <div onClick='dtc_command_set_odb("init_readout","trkdtc.log")'            > Run             </div>
                         </div>
                     </div>
                     <div class="dropup">
                         <input type=button class="dropbtn" value='configure_ja'>
                         <div class="dropup-content">
                             <div onClick='dtc_load_cmd_parameters("configure_ja")'> Load Parameters </div>
                             <div onClick='dtc_command_set_odb("configure_ja","trkdtc.log")'            > Run             </div>
                         </div>
                     </div>
                     <input type=button value='print status'     onClick='dtc_command_set_odb("print_status"    ,"trkdtc.log")'>
                     <input type=button value='reset output'     onClick='dtc_command_set_odb("reset_output"    ,"trkdtc.log")'>
                 </td>
                 <td> Register </td>
                 <td> Value    </td>
             `;
             tbody.appendChild(tr);
         
             tr = document.createElement('tr');
         
             td = document.createElement('td');
             td.colSpan = 6;
             
             td.innerHTML = `
                 <input type=button value='compile run plan'  onClick='cfo_command_set_odb("cfo_compile_run_plan","trkdtc.log")'>
             <input type=button value='launch run plan'  onClick='cfo_command_set_odb("cfo_launch_run_plan","trkdtc.log")'>
             <input type=button value='read subevents'   onClick='cfo_command_set_odb("read_subevents"     ,"trkdtc.log")'>
             <input type=button value='soft reset'       onClick='cfo_command_set_odb("soft_reset"         ,"trkdtc.log")'>
             <input type=button value='hard reset'        onClick='cfo_command_set_odb("hard_reset"         ,"trkdtc.log")'>
             `;
             tr.appendChild(td);

             // PARAMETERS: title,name,cmd,table_name,path_func,log: output of everything trace-related goes to trace.log
             td = document.createElement('td');
             td.colSpan = 2;
             tr.appendChild(td);
             
             td = document.createElement('td');
             cmdb = new Command_B('write CFO register','write_register',dtc_command_set_odb_C,'cmd_params', dtc_cmd_parameter_path,'trkdtc.log');
             let btn  = mu2e_make_exec_button_B(cmdb);
             td.appendChild(btn);
             tr.appendChild(td);
             
             // read and write need to know a) PCIE b) link in question
             
             td = document.createElement('td');
             td.innerHTML = `<div class="modbvalue" data-odb-path="/Mu2e/Commands/DAQ/CFO/write_register/register" data-odb-editable="1" data-format="%x"></div>`;
             tr.appendChild(td);
             
             td = document.createElement('td');
             td.innerHTML = `<div class="modbvalue" data-odb-path="/Mu2e/Commands/DAQ/CFO/write_register/value"    data-odb-editable="1" data-format="%x"></div>`;
             tr.appendChild(td);
             
             tbody.appendChild(tr);

             // -------------------------------------- read register row
             tr = document.createElement('tr');
             
             td = document.createElement('td');
             td.colSpan = 6;
             tr.appendChild(td);
             
             td = document.createElement('td');
             td.colSpan = 2;
             tr.appendChild(td);
             
             td = document.createElement('td');
             cmdb = new Command_B('read_register','read_register',dtc_command_set_odb_C,'cmd_params', dtc_cmd_parameter_path,'trkdtc.log');
             btn  = mu2e_make_exec_button_B(cmdb);
             td.appendChild(btn);
             tr.appendChild(td);
             
             td  = document.createElement('td');
             td.innerHTML = `<div class="modbvalue" data-odb-path="/Mu2e/Commands/DAQ/CFO/read_register/register" data-odb-editable="1" data-format="%x"></div>`;
             tr.appendChild(td);
             
             td = document.createElement('td');
             td.innerHTML = `<div class="modbvalue" data-odb-path="/Mu2e/Commands/DAQ/CFO/read_register/value"    data-odb-editable="1" data-format="%x"></div>`;
             tr.appendChild(td);
             
             tbody.appendChild(tr);
             
             cmd_table.appendChild(thead);
             cmd_table.appendChild(tbody);
         }
         
         
         document.addEventListener("DOMContentLoaded", loadPage);
        </script>
    </head>
    <!--
         it seems to be convenient to have the high-level topology defined in HTML
         and use javascript to fill internal details
         P.M.: having show_facilities etc here is important
    -->
    <body class="mcss" onload="mhttpd_init('dtc_control'); show_facilities(); msg_load();">
        <div id="mheader"></div>
        <div id="msidenav"></div>
        <div id="mmain">
            
<!-- ---------------- row 1: DTC registers - are they needed?  and the output field ----------------  -->
      
            <div class="row">
                <h2 id="table-title">DTC </h2>
                
                <div class="column"> <!-- gets pushed to the left -->
                    
                    <table class="mtable" id="cfo_cmd_table">  <!-- Table content is generated dynamically -->
                    </table>
                    
                    <table class="mtable" id="roc_commands">  <!-- Table content is generated dynamically -->
                    </table>
                    
                    <table class="mtable" id="cmd_params">    <!-- Table content is generated dynamically -->
                    </table>
                    
                </div>
                
                <div class="column"; style="width:55%"> <!-- gets pushed to the left -->
                    <!--    ------------------------- this is the output window  -->
                    <table >
                        <tr>
                            <td id="navigationFacilitiesButtons"></td>
                        </tr>
                    </table>
                    
                    <table class="mtable" id="messageTable" ">
                        <tr>
                            <td class="select">
                                <label for="nameFilter">Filter: </label>
                                
                                <input type="text" id="nameFilter" placeholder="Program Name" title="Please enter a program name">
                                
                                <select id="typeFilter" title="Please select a message type">
                                    <option value="">- all -</option>
                                    <option>INFO</option>
                                    <option>ERROR</option>
                                    <option>USER</option>
                                    <option>LOG</option>
                                    <option>TALK</option>
                                </select>
                                
                                <input type="text" id="timeFilter" placeholder="Time (hh:mm:ss)" title="Please select a time to search">
                                <input type="text" id="textFilter" placeholder="Search Text" title="Please enter some search text">
                                
                                <select id="timeRangeFilter" title="We will search the file from the current time into the past">
                                    <option>24 h</option>
                                    <option>48 h</option>
                                    <option>72 h</option>
                                    <option>7 d</option>
                                    <option>30 d</option>
                                </select>
                                <button class="mbutton" id="filterBtn">Filter</button>
                                
                                <select id="recentsDropdown">
                                    <option value="">Select a recent filter</option>
                                </select>
                                
                            </td>
                        </tr>
                        
                        <tr>
                            <td class="select">
                                <div class="mmessagebox mfont" id="messageFrame"><h1 class="mtableheader"> Messages</h1></div>
                            </td>
                        </tr>
                    </table>
                    
                    <div id="loadingOverlay"
                         style="  display: none;
                             position: fixed;
                             top: 0;
                             left: 0;
                             width: 100%;
                             <!--
                             height: 100%;
                             -->
                             height: 600px;
                             background-color: rgba(128, 128, 128, 0.8);
                             color: white;
                             font-size: 24px;
                             align-items: center;
                             justify-content: center;
                             z-index: 1000;">
                        Searching messages... Mouse Click to stop.
                    </div>
                    
                </div>
                
                <div id="dlgError" class="dlgFrame">
                    <div class="dlgTitlebar">Error message</div>
                    <div class="dlgPanel">
                        <div id="dlgErrorText">Dialog Contents</div>
                        <br />
                        <button class="dlgButton" onClick="dlgHide('dlgError')">Close</button>
                    </div>
                </div>
                
                <script src="mu2e_messages.js"></script>
            </div>
        </div>
    </body>
</html>
