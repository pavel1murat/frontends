<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="midas.css">
    <link rel="stylesheet" href="mu2edaq.css">
    <script src="controls.js"></script>
    <script src="midas.js"></script>
    <script src="mhttpd.js"></script>
    <script src="filesrw.js"></script>
    <script src="odbbrowser.js"></script>
    
    <script src="global_variables.js"></script>
    <script src="mu2edaq.js"></script>
    <script src="mu2e_mess_001.js"></script>
    <script src="tfm_commands.js"></script>
    
    <title>TFM control</title>
    
    <script>

  //-----------------------------------------------------------------------------
  // global variables
  // the hostname (nodename) should be the same within the scope of this script
  //-----------------------------------------------------------------------------
     function updateNodeTable(node_index,active_process_label) {
       const node_name = tfm_get_node_name(g_node);
       g_hostname      = node_name;

       logfile         = 'artdaq'
       const table     = document.getElementById('node_table');
       table.innerHTML = '';
       table.node_name = node_name;
       tbody           = document.createElement('tbody');
//-----------------------------------------------------------------------------
// pick current active node (g_node from tfm_commands.js) and list its processes
//-----------------------------------------------------------------------------
       var paths=["/Mu2e/ActiveRunConfiguration/DAQ/Nodes/"+table.node_name+"/Artdaq"];
       let process_list=[] ;
       sleep(1000);
       mjsonrpc_db_get_values(paths).then(function(rpc) {
         let artdaq      = rpc.result.data[0];
         console.log('artdaq=',artdaq);
         if (artdaq.enabled == 1) {
           /* loop over ARTDAQ items */
           for (const key in artdaq) {
             if (key.indexOf('/') >= 0) { continue; }
             if ((key.toUpperCase() == 'STATUS') || (key.toUpperCase() == 'ENABLED')) {continue;}
             // artdaq process
             const p = artdaq[key];
             if (p.enabled) {
               process_list.push(key);
             }
           }
         }
         
         let r1 = document.createElement('tr');
         r1.innerHTML = '<td> <div class="mtableheader" colspan=2>'+node_name+' ARTDAQ processes: </div> </td>'
         td1         = document.createElement('td');
         td1.colspan = 3;

         let active_btn = 0;
         div1 = document.createElement('div');
         div1.className = 'tab';
         let np = process_list.length;
         for (let i=0; i<np; i++) {
           const p = process_list[i];
           // if active-proces_label is undefined, choose (highlight) the first process as active
           if (active_process_label == null) {
             active_process_label = p;
           }
           let btn = document.createElement('button');
           // btn.style.display = "block";
           btn.className = "process_tabs"
           if (i == g_process) {
             btn.className += " active";
           }
           btn.innerHTML = p;
           btn.id        = 'process_btn_'+String(i).padStart(2,'0')
           //        btn.onclick   = function () { tfm_choose_artdaq_process_id(event,btn.id); }
           btn.onclick   = function () { tfm_update_artdaq_process_id(event,btn.id); }
           div1.appendChild(btn);
         }
         
         td1.appendChild(div1);
         r1.appendChild(td1);
         tbody.appendChild(r1);

         tr2 = document.createElement('tr');
         td2 = document.createElement('td');
         td2.colspan = 2;

         let cmd, btn;
         
         cmd = new Command_B('load_parameters','load_parameters',mu2e_odb_load_table,'cmd_params',artdaq_process_config_path,logfile);
         btn = mu2e_make_exec_button_B(cmd);
         td2.appendChild(btn);
      
         // load artdaq table on a given node
         cmd = new Command_B('get_status','get_status',mu2e_odb_load_table,'cmd_params',node_artdaq_parameter_path,logfile);
         btn = mu2e_make_exec_button_B(cmd);
         td2.appendChild(btn);

         cmd = new Command_B('print_fcl','print_fcl',tfm_node_command_set_odb_B,'cmd_params',tfm_cmd_parameter_path,logfile);
         btn = mu2e_make_exec_button_B(cmd);
         td2.appendChild(btn);
         
         cmd = new Command_B('generate_fcl','generate_fcl',tfm_command_set_odb,'cmd_params',tfm_cmd_parameter_path,logfile);
         btn = mu2e_make_exec_button_B(cmd);
         td2.appendChild(btn);

         // note different parameter path
         cmd = new Command_B('print_processes','print_processes',tfm_command_set_odb,'cmd_params',node_artdaq_parameter_path,logfile);
         btn = mu2e_make_exec_button_B(cmd);
         td2.appendChild(btn);

         tr2.appendChild(td2);
         
         tbody.appendChild(tr2);
         // update table
         table.appendChild(tbody);
         //-----------------------------------------------------------------------------
         // update cmd_params
         //-----------------------------------------------------------------------------
         g_process_label = active_process_label;
         if (active_process_label != null) {
           const table     = document.getElementById('cmd_params');
           table.innerHTML = '';
           const path = artdaq_process_config_path(null);
           odb_browser('cmd_params',path,0);
         }
         
       }).catch(function(error) {
         mjsonrpc_error_alert(error);
       });
     }

  
//-----------------------------------------------------------------------------
// main function defining the page contents
//-----------------------------------------------------------------------------
     function loadPage() {

       const urlParams = new URLSearchParams(window.location.search);
     
       g_hostname      = urlParams.get('hostname') || null ;  //
       g_process_label = urlParams.get('process' ) || 'none';  //
       g_run_conf      = odb_get_active_run_conf_name();
       
       const logfile = 'artdaq';
       
       let btn, cmd;
       //-----------------------------------------------------------------------------
       //  fill TFM table
       //-----------------------------------------------------------------------------
       const tfm_table     = document.getElementById('tfm_table');
       tfm_table.innerHTML = '';
       let thead = document.createElement('thead');
      
       tr = document.createElement('tr');
       tr.innerHTML ='<td> <div class="mtableheader" colspan=2> Trigger Farm Manager (TFM) </div> </td>';
       
       td = document.createElement('td');
       // td.colSpan = 1;
       td.innerHTML = `
         <div class="mtableheader">
           <a href="https://mu2einternalwiki.fnal.gov/wiki/TFM_control_page#" target="_blank">help</a>
         </div>`
       tr.appendChild(td);
       thead.appendChild(tr);
       tfm_table.appendChild(thead);
    
       tfm_tbody = document.createElement('tbody');
       const  paths=["/Mu2e/ActiveRunConfiguration/DAQ/Nodes",];
       mjsonrpc_db_get_values(paths).then(function(rpc) {
         let list_of_nodes  = rpc.result.data[0];

         let row     = null;
         let td      = null;
         let div     = null;
         let node_id = 0;
         let nnodes  = 0;
         
         let new_row = 1;
         for (const key in list_of_nodes) {
           if (key.indexOf('/') >= 0) { continue; }
           const node_name = key;
           const node      = list_of_nodes[key];
           if (new_row) {
             row = document.createElement('tr');
             td  = document.createElement('td');
             td.colspan = 20;
             
             div = document.createElement('div');
             div.className = 'tab';
             td.appendChild(div);
             row.appendChild(td);
             new_row = 0;
           }
           
           btn = document.createElement('button');
           btn.className = 'nodetabs';
           if (node.enabled == 0) btn.className += ' disabled';
           btn.id        = 'node'+node_id.toString().padStart(3,'0');
           btn.onclick   = function() { tfm_update_node_id(event); }
           btn.innerHTML = node_name;
           div.appendChild(btn);
           
           nnodes += 1;
           
           if ((node_name == 'mu2e-dl-01') || (nnodes >= 9)) {
             // the first table head row has two data fields, align
             td = document.createElement('td');
             row.appendChild(td);
             tfm_tbody.appendChild(row);
             
             // start new row
             nnodes  = 0;
             new_row = 1;
           }
           node_id += 1;
         }
         
         if (nnodes > 0) {
           td = document.createElement('td');
           row.appendChild(td);
           tfm_tbody.appendChild(row);
         }
      //-----------------------------------------------------------------------------
      // now come commands
      //-----------------------------------------------------------------------------
         let tr2 = document.createElement('tr');
         
         let td2     = document.createElement('td');
         td2.colSpan = 2;

         cmd = new Command_B('load_parameters','load_parameters', mu2e_load_conf_table ,'cmd_params',tfm_cfg_parameter_path,logfile);
         btn = mu2e_make_exec_button_B(cmd);
         td2.appendChild(btn);

         // output of everything trace-related goes to trace.log
         cmd = new Command_B('cleanup','cleanup',mu2e_command_set_odb_B,'cmd_params',node_artdaq_parameter_path,logfile);
         btn = tfm_make_exec_button_B(cmd);
         td2.appendChild(btn);
         //-----------------------------------------------------------------------------
         // create a "get_state" drop-button
         //-----------------------------------------------------------------------------
         cmd = new Command_D('get_state','get_state','tfm_menu_01',mu2e_command_set_odb_B,'cmd_params',tfm_cmd_parameter_path,tfm_load_help_page,logfile);
         btn = mu2e_make_dropup_button_D(cmd);
         td2.appendChild(btn);
         
         cmd = new Command_D('generate_fcl','generate_fcl','tfm_menu_01',mu2e_command_set_odb_B,'cmd_params',tfm_cmd_parameter_path,tfm_load_help_page,logfile);
         btn = mu2e_make_dropup_button_D(cmd);
         td2.appendChild(btn);
         
         // which logfile the output should go? - artdaq.log
         cmd = new Command_D('print_fcl','print_fcl','tfm_menu_01',mu2e_command_set_odb_B,'cmd_params',tfm_cmd_parameter_path,tfm_load_help_page,logfile);
         btn = mu2e_make_dropup_button_D(cmd);
         td2.appendChild(btn);
         
         // output of everything trace-related goes to trace.log
         cmd = new Command_B('tlvls','tlvls',mu2e_command_set_odb_B,'cmd_params',node_artdaq_parameter_path,logfile);
         btn = tfm_make_exec_button_B(cmd);
         td2.appendChild(btn);
         
         cmd = new Command_D('tshow','tshow','tfm_menu_01',mu2e_command_set_odb_B,'cmd_params',node_artdaq_parameter_path,tfm_load_help_page,logfile);
         btn = mu2e_make_dropup_button_D(cmd);
         td2.appendChild(btn);
         
         cmd = new Command_B('treset','treset',mu2e_command_set_odb_B,'cmd_params',node_artdaq_parameter_path,logfile);
         btn = tfm_make_exec_button_B(cmd);
         td2.appendChild(btn);

         cmd = new Command_B('tonM','tonM',mu2e_command_set_odb_B,'cmd_params',node_artdaq_parameter_path,logfile);
         btn = tfm_make_exec_button_B(cmd);
         td2.appendChild(btn);

         cmd = new Command_B('toffM','toffM',mu2e_command_set_odb_B,'cmd_params',node_artdaq_parameter_path,logfile);
         btn = tfm_make_exec_button_B(cmd);
         td2.appendChild(btn);
         
         cmd = new Command_B('tonS','tonS',mu2e_command_set_odb_B,'cmd_params',node_artdaq_parameter_path,logfile);
         btn = tfm_make_exec_button_B(cmd);
         td2.appendChild(btn);

         cmd = new Command_B('toffS','toffS',mu2e_command_set_odb_B,'cmd_params',node_artdaq_parameter_path,logfile);
         btn = tfm_make_exec_button_B(cmd);
         td2.appendChild(btn);
         
         cmd = new Command_B('print_procinfos','print_procinfos',mu2e_command_set_odb_B,'cmd_params',tfm_cmd_parameter_path,logfile);
         btn = tfm_make_exec_button_B(cmd);
         td2.appendChild(btn);
         
         // and the last action button not using ODB
         cmd = new Command_B('reset_output','reset_output',mu2e_command_set_odb_B,'cmd_params',tfm_cmd_parameter_path,logfile);
         btn = tfm_make_exec_button_B(cmd);
         td2.appendChild(btn);
         
         cmd = new Command_B('clear_farm_status','clear_farm_status',mu2e_command_set_odb_B,'cmd_params',tfm_cmd_parameter_path,logfile);
         btn = tfm_make_exec_button_B(cmd);
         td2.appendChild(btn);
         tr2.appendChild(td2);

         // fill empty space under "help" 
         //      td2 = document.createElement('td');
         //      tr2.appendChild(td2);
         
         tfm_tbody.appendChild(tr2);
         tfm_table.appendChild(tfm_tbody);

      //-----------------------------------------------------------------------------
      // set active node button
      //-----------------------------------------------------------------------------
         if (g_hostname != 'undefined') {
           g_node = tfm_get_node_id(g_hostname);
         }
      
      //-----------------------------------------------------------------------------
      //  fill node table
      //-----------------------------------------------------------------------------
         updateNodeTable(g_node,g_process_label);
      //-----------------------------------------------------------------------------
      //  fill TFM parameters table
      //-----------------------------------------------------------------------------
         const tfm_params_table     = document.getElementById('cmd_params');
         tfm_params_table.innerHTML = '';
      
         odb_browser('cmd_params',`/Mu2e/ActiveRunConfiguration/DAQ/Tfm`,0);
         
       }).catch(function(error) {
         mjsonrpc_error_alert(error);
       });
     } <!-- end of loadPage -->

//-----------------------------------------------------------------------------
// global listeners - add one to close all menus
//-----------------------------------------------------------------------------
     
     document.addEventListener("click", e => {hideAllMenus(); }); // to close all menues
     document.addEventListener("DOMContentLoaded", loadPage);
   
    </script>
  </head>
<!-- ------------------------------------------------------------------------------
     here the HTML structure starts
     it seems to be convenient to have the large scale topology in HtML and use
     javascript to fill hte details
     her is the high-level structure of the page - menus on the left, output window - on the right
  ------------------------------------------------------------------------------  -->
  <body class="mcss" onload="mhttpd_init('tfm_control');">
    
    <!-- actions assigned in the Command_D constructor -->
    <div id="tfm_menu_01" class="daq_menu">
      <div data-action="load_cmd_par">load_parameters</div>
    </div>

    <!-- actions assigned in the Command_D constructor -->
    <div id="tfm_menu_02" class="daq_menu">
      <div data-action="load_cmd_par">load_parameters</div>
      <div data-action="help"        >help</div>
    </div>

    
    <div id="mheader"></div>
    <div id="msidenav"></div>
    <div id="mmain">
<!-- ---------------- row 1: ----------------  -->
      <div class="row">
        <div class="column" style="width:38%"> <!-- column gets pushed to the left -->
          <table class="mtable" id="tfm_table" > </table> <!-- Table content is generated dynamically -->
          <table class="mtable" id="node_table"> </table> <!-- Table content is generated dynamically -->
          <table class="mtable" id="cmd_params"> </table> <!-- Table content is generated dynamically -->
        </div>

        <!--    ========================== this is the output window ===============================  -->
        
        <div class="column"; style="width:62%"> <!-- gets pushed to the left -->
          
          <table class="mtable" id="messageTableA">
            <tr>
              <td>
                <div class="mfont" id="messageFrameB">
                  <h1 class="mtableheader"> TFM command log</h1>
                </div>
              </td>
            </tr>
            <tr>
              <td>
                <div class="mfont" id="messageFrameA">
                </div>
              </td>
            </tr>
          </table>
          
        </div>
      </div>
    </div>
  </body>
</html>
